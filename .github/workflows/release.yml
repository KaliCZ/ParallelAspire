name: release

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    # Gate on main: a Release drafted through the UI carries the selected
    # branch in target_commitish. Only releases targeted at main publish.
    if: github.event.release.target_commitish == 'main'
    runs-on: ubuntu-latest
    environment: Nuget.org
    permissions:
      contents: write
      id-token: write   # mint a short-lived NuGet key via Trusted Publishing (OIDC)

    env:
      config: 'Release'
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Parse version from tag
      id: version
      run: |
        TAG="${GITHUB_REF_NAME}"
        echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

    # GeneratePackageOnBuild=true in the csproj means `dotnet build` produces
    # the nupkg as a side-effect; no separate `dotnet pack` step needed.
    - name: Build and pack
      env:
        RELEASE_URL: ${{ github.event.release.html_url }}
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        dotnet build ParallelAspire.slnx \
          -c $config \
          -p:Version="$VERSION" \
          -p:PackageReleaseNotes="See $RELEASE_URL" \
          -p:PackageOutputPath="$PWD/out"

    # Validate the Release binaries before they leave the runner.
    - name: Test
      run: dotnet test --no-build -c $config

    # Trusted Publishing: exchange the GitHub OIDC token for a short-lived nuget.org
    # key — no long-lived secret. Requires a publishing policy on nuget.org bound to
    # this repo + workflow + environment, under the account named by vars.NUGET_USER.
    - name: NuGet login (Trusted Publishing)
      id: nuget-login
      uses: NuGet/login@v1
      with:
        user: ${{ vars.NUGET_USER }}

    - name: Publish package
      run: dotnet nuget push ./out/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}

    - name: Attach package to release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: gh release upload "$GITHUB_REF_NAME" ./out/*.nupkg
